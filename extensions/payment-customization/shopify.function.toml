# Payment Customization Function — TruCredit credit check at checkout
# Shopify Functions use JavaScript (ES2023 target), deployed via Shopify CLI

name = "trucredit-payment"
type = "payment_customization"
api_version = "2025-10"

[build]
command = ""
path = ""

[ui.paths]
create = "/"
details = "/"

[[targeting]]
target = "payments.payment-customization.run"

[input.variables]
namespace = "payments"
key = "payment_customization"

# Declare metafield access so the function can read trucredit/credit_status on customers
# Without this, the metafield won't be available in input.cart.buyerIdentity.customer.metafield
[[metafields]]
namespace = "trucredit"
key = "credit_status"
